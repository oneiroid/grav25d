<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity — Spacetime Curvature</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap');

  :root {
    --void: #06060a;
    --deep: #0a0a12;
    --glow-cyan: #00d4e8;
    --glow-amber: #e8a030;
    --glow-rose: #e84060;
    --hud-text: #b8c8e0;
    --hud-bright: #eef2f8;
    --hud-dim: #7088a0;
    --panel-bg: rgba(8, 10, 18, 0.94);
    --panel-border: rgba(0, 180, 220, 0.15);
    --panel-glow: rgba(0, 180, 220, 0.06);
    --accent: #e8a030;
    --bracket-color: rgba(0, 200, 230, 0.35);
    --bracket-len: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--hud-text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 300;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  /* ── Bracket mixin (corner brackets on panels) ── */
  .bracketed {
    position: relative;
  }
  .bracketed::before,
  .bracketed::after {
    content: '';
    position: absolute;
    width: var(--bracket-len);
    height: var(--bracket-len);
    pointer-events: none;
  }
  .bracketed::before {
    top: -1px; left: -1px;
    border-top: 1px solid var(--bracket-color);
    border-left: 1px solid var(--bracket-color);
  }
  .bracketed::after {
    bottom: -1px; right: -1px;
    border-bottom: 1px solid var(--bracket-color);
    border-right: 1px solid var(--bracket-color);
  }

  /* ── Top bar ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(8,10,18,0.95) 0%, rgba(8,10,18,0.7) 80%, transparent 100%);
    pointer-events: none;
  }
  #top-bar > * { pointer-events: auto; }

  #top-bar .title-group {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  #top-bar h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--hud-bright);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #top-bar .sub {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--hud-dim);
  }

  #top-bar .stats {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
  }
  .stat .lbl {
    color: var(--hud-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .stat .val {
    color: var(--hud-bright);
    font-weight: 400;
    font-size: 14px;
  }
  .val.on { color: var(--glow-cyan); text-shadow: 0 0 8px rgba(0,212,232,0.3); }
  .val.off { color: var(--glow-amber); text-shadow: 0 0 8px rgba(232,160,48,0.3); }

  /* ── Pulse dot beside status ── */
  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--glow-cyan);
    box-shadow: 0 0 6px var(--glow-cyan);
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
    margin-right: 4px;
  }
  .pulse-dot.paused {
    background: var(--glow-amber);
    box-shadow: 0 0 6px var(--glow-amber);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--glow-cyan); }
    50% { opacity: 0.4; box-shadow: 0 0 2px var(--glow-cyan); }
  }

  /* ── Body list (floating right panel) ── */
  #body-panel {
    position: fixed;
    top: 60px; right: 16px;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 10px 14px;
    min-width: 170px;
    box-shadow: 0 0 20px var(--panel-glow), inset 0 0 30px rgba(0,180,220,0.01);
  }
  #body-panel .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--hud-dim);
    margin-bottom: 6px;
  }
  .body-row {
    display: flex; align-items: center; gap: 8px; margin: 4px 0;
    font-size: 12px;
  }
  .body-pip {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Bottom toolbar ── */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    gap: 0;
    background: linear-gradient(0deg, rgba(8,10,18,0.95) 0%, rgba(8,10,18,0.7) 80%, transparent 100%);
    pointer-events: none;
  }
  #bottom-bar > * { pointer-events: auto; }

  #bottom-inner {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 12px;
    gap: 16px;
    border-top: 1px solid rgba(0,180,220,0.12);
    position: relative;
  }
  /* Glow line on top edge */
  #bottom-inner::before {
    content: '';
    position: absolute;
    top: -1px; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,200,230,0.25), transparent);
  }

  .toolbar-section {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--hud-dim);
  }

  /* ── Sliders ── */
  .slider-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-control .slider-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hud-text);
    min-width: 54px;
    text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 160px; height: 4px;
    background: rgba(80, 100, 140, 0.30);
    border-radius: 2px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(232,160,48,0.35), 0 0 3px rgba(232,160,48,0.5);
    transition: box-shadow 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 16px rgba(232,160,48,0.5), 0 0 4px rgba(232,160,48,0.7);
  }
  .slider-val {
    font-size: 13px;
    color: var(--hud-bright);
    font-weight: 400;
    min-width: 44px;
    text-align: right;
  }
  #mass-slider { width: 200px; }

  /* ── Params panel (left side) ── */
  #params-panel {
    position: fixed;
    top: 60px; left: 16px;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 10px 14px;
    min-width: 310px;
    box-shadow: 0 0 20px var(--panel-glow), inset 0 0 30px rgba(0,180,220,0.01);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  /* ── Preset pills ── */
  .preset-row {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .preset-btn {
    background: rgba(80, 100, 140, 0.10);
    border: 1px solid rgba(80, 100, 140, 0.22);
    border-radius: 20px;
    padding: 3px 11px;
    color: var(--hud-text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  .preset-btn:hover {
    border-color: rgba(0, 200, 230, 0.3);
    color: var(--hud-bright);
    background: rgba(0, 200, 230, 0.04);
    box-shadow: 0 0 8px rgba(0, 200, 230, 0.08);
  }
  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 160, 48, 0.06);
    box-shadow: 0 0 10px rgba(232, 160, 48, 0.1), inset 0 0 8px rgba(232, 160, 48, 0.03);
  }

  /* ── Keybinding hints (inline in bottom bar) ── */
  .keyhints {
    display: flex;
    gap: 6px 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 220px;
  }
  .k {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 10px; color: var(--hud-dim);
  }
  .k b {
    background: rgba(80, 100, 140, 0.14);
    border: 1px solid rgba(80, 100, 140, 0.25);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--hud-bright);
    font-weight: 400;
    font-size: 10px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100; pointer-events: none;
    font-family: 'Fraunces', serif;
    font-size: 28px; letter-spacing: 6px;
    color: var(--hud-bright);
    opacity: 0; transition: opacity 0.3s ease;
    text-shadow: 0 0 30px rgba(0, 200, 230, 0.25), 0 0 60px rgba(0, 200, 230, 0.08);
  }
  #toast.show { opacity: 1; }

  /* ── Scan-line overlay (subtle) ── */
  #scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 5;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    opacity: 0.5;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scanlines"></div>

<!-- ── Top bar ── -->
<div id="top-bar">
  <div class="title-group">
    <h1>Gravity</h1>
    <span class="sub">spacetime curvature</span>
  </div>
  <div class="stats">
    <div class="stat"><span class="lbl">bodies</span><span class="val" id="s-n">0</span></div>
    <div class="stat"><span class="lbl">G</span><span class="val" id="s-g">6.674</span></div>
    <div class="stat"><span id="pulse-dot" class="pulse-dot"></span><span class="val on" id="s-st">running</span></div>
  </div>
</div>

<!-- ── Body list panel ── -->
<div id="body-panel" class="bracketed">
  <div class="section-label">bodies</div>
  <div id="body-list"><span style="color:var(--hud-dim)">no bodies</span></div>
</div>

<!-- ── Params panel (left) ── -->
<div id="params-panel" class="bracketed">
  <div class="section-label">parameters</div>
  <div class="slider-control">
    <span class="slider-label">mass</span>
    <input type="range" id="mass-slider" min="-200" max="200" step="1.0" value="5">
    <span class="slider-val" id="mass-val">5.0</span>
  </div>
  <div class="slider-control">
    <span class="slider-label">gravity</span>
    <input type="range" id="g-slider" min="-50" max="50" step="0.1" value="6.674">
    <span class="slider-val" id="g-val">6.674</span>
  </div>
  <div class="slider-control">
    <span class="slider-label">time</span>
    <input type="range" id="time-slider" min="0.05" max="5" step="0.05" value="1">
    <span class="slider-val" id="time-val">1.0x</span>
  </div>
  <div class="slider-control">
    <span class="slider-label">z scale</span>
    <input type="range" id="zscale-slider" min="1" max="30" step="0.5" value="8.5">
    <span class="slider-val" id="zscale-val">8.5</span>
  </div>
  <div class="slider-control">
    <span class="slider-label">curve</span>
    <input type="range" id="curve-slider" min="0.1" max="2" step="0.05" value="0.8">
    <span class="slider-val" id="curve-val">0.80</span>
  </div>
  <div class="slider-control">
    <span class="slider-label">soften</span>
    <input type="range" id="soften-slider" min="0.2" max="8" step="0.1" value="2.0">
    <span class="slider-val" id="soften-val">2.0</span>
  </div>
</div>

<!-- ── Bottom toolbar ── -->
<div id="bottom-bar"><div id="bottom-inner">
  <div class="toolbar-section">
    <div class="preset-row">
      <button class="preset-btn active" data-p="solar">solar</button>
      <button class="preset-btn" data-p="binary">binary</button>
      <button class="preset-btn" data-p="figure8">figure-8</button>
      <button class="preset-btn" data-p="trojan">trojan</button>
      <button class="preset-btn" data-p="runaway">runaway</button>
      <button class="preset-btn" data-p="necklace">necklace</button>
      <button class="preset-btn" data-p="intruder">intruder</button>
      <button class="preset-btn" data-p="collapse">collapse</button>
      <button class="preset-btn" data-p="hierarchy">hierarchy</button>
    </div>
  </div>
  <div class="toolbar-section">
    <div class="keyhints">
      <span class="k"><b>Click</b> add</span>
      <span class="k"><b>RClick</b> remove</span>
      <span class="k"><b>Drag</b> orbit</span>
      <span class="k"><b>Scroll</b> zoom</span>
      <span class="k"><b>Space</b> pause</span>
      <span class="k"><b>R</b> reset</span>
    </div>
  </div>
</div></div>

<div id="toast"></div>

<script>
// =====================================================
// GRAVITY — SPACETIME CURVATURE SIMULATOR (3D)
// =====================================================
// 2D physics (x,y) with Z axis showing gravitational
// potential. Wireframe grid deforms to show curvature.
// Bodies sit on the curved surface.
// =====================================================

const G_DEFAULT = 6.674;
const SOFTENING = 0.2;
let GRID_SOFTENING = 2.;    // Plummer softening radius for grid wells
const DT = 0.005;
const STEPS_PER_FRAME = 4;
const BOUNDARY_R = 60;
const BOUNCE_DAMP = 0.8;
const GRID_N = 100;          // grid resolution
let Z_SCALE = 8.5;           // depth multiplier for pow-of-log mapping
let CURVATURE_EXP = 0.8;    // power exponent — compresses big masses, amplifies small
const PHI_SCALE = 20;        // log input divisor — reduces bump/well asymmetry under normalization
const MAX_WELL_DEPTH = 150;  // clamp only truly extreme depths
let timeDilation = 1.0;      // time dilation multiplier

// ── 3D Vector ────────────────────────────────────────
const v3 = {
  create: (x=0,y=0,z=0) => new Float64Array([x,y,z]),
  add: (a,b) => new Float64Array([a[0]+b[0],a[1]+b[1],a[2]+b[2]]),
  sub: (a,b) => new Float64Array([a[0]-b[0],a[1]-b[1],a[2]-b[2]]),
  scale: (a,s) => new Float64Array([a[0]*s,a[1]*s,a[2]*s]),
  dot: (a,b) => a[0]*b[0]+a[1]*b[1]+a[2]*b[2],
  cross: (a,b) => new Float64Array([a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]),
  len: (a) => Math.hypot(a[0],a[1],a[2]),
  norm: (a) => { const l=Math.hypot(a[0],a[1],a[2])||1; return new Float64Array([a[0]/l,a[1]/l,a[2]/l]); },
};

// ── Matrix helpers (column-major Float32Array) ───────
function mat4Perspective(fov, aspect, near, far) {
  const f = 1/Math.tan(fov*0.5), nf = 1/(near-far);
  return new Float32Array([f/aspect,0,0,0, 0,f,0,0, 0,0,(far+near)*nf,-1, 0,0,2*far*near*nf,0]);
}

function mat4LookAt(eye, center, up) {
  const z = v3.norm(v3.sub(eye, center));
  const x = v3.norm(v3.cross(up, z));
  const y = v3.cross(z, x);
  return new Float32Array([
    x[0],y[0],z[0],0,
    x[1],y[1],z[1],0,
    x[2],y[2],z[2],0,
    -v3.dot(x,eye),-v3.dot(y,eye),-v3.dot(z,eye),1
  ]);
}

function mat4Mul(a, b) {
  const r = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++) {
      let s = 0;
      for (let k = 0; k < 4; k++) s += a[i+k*4] * b[k+j*4];
      r[i+j*4] = s;
    }
  return r;
}

function mat4Inv(m) {
  const r = new Float32Array(16);
  const m0=m[0],m1=m[1],m2=m[2],m3=m[3],m4=m[4],m5=m[5],m6=m[6],m7=m[7];
  const m8=m[8],m9=m[9],m10=m[10],m11=m[11],m12=m[12],m13=m[13],m14=m[14],m15=m[15];
  const b0=m0*m5-m1*m4,b1=m0*m6-m2*m4,b2=m0*m7-m3*m4,b3=m1*m6-m2*m5;
  const b4=m1*m7-m3*m5,b5=m2*m7-m3*m6,b6=m8*m13-m9*m12,b7=m8*m14-m10*m12;
  const b8=m8*m15-m11*m12,b9=m9*m14-m10*m13,b10=m9*m15-m11*m13,b11=m10*m15-m11*m14;
  const det=b0*b11-b1*b10+b2*b9+b3*b8-b4*b7+b5*b6;
  if(Math.abs(det)<1e-8) return null;
  const id=1/det;
  r[0]=(m5*b11-m6*b10+m7*b9)*id; r[1]=(m2*b10-m1*b11-m3*b9)*id;
  r[2]=(m13*b5-m14*b4+m15*b3)*id; r[3]=(m10*b4-m9*b5-m11*b3)*id;
  r[4]=(m6*b8-m4*b11-m7*b7)*id; r[5]=(m0*b11-m2*b8+m3*b7)*id;
  r[6]=(m14*b2-m12*b5-m15*b1)*id; r[7]=(m8*b5-m10*b2+m11*b1)*id;
  r[8]=(m4*b10-m5*b8+m7*b6)*id; r[9]=(m1*b8-m0*b10-m3*b6)*id;
  r[10]=(m12*b4-m13*b2+m15*b0)*id; r[11]=(m9*b2-m8*b4-m11*b0)*id;
  r[12]=(m5*b7-m4*b9-m6*b6)*id; r[13]=(m0*b9-m1*b7+m2*b6)*id;
  r[14]=(m13*b1-m12*b3-m14*b0)*id; r[15]=(m8*b3-m9*b1+m10*b0)*id;
  return r;
}

// ── Palette ──────────────────────────────────────────
const COLORS = [
  [0, 0.83, 0.91],   // cyan
  [0.91, 0.63, 0.19], // amber
  [0.91, 0.25, 0.38], // rose
  [0.38, 0.91, 0.47], // green
  [0.63, 0.44, 0.88], // purple
  [0.91, 0.78, 0.25], // yellow
  [0.28, 0.60, 0.91], // blue
  [0.91, 0.41, 0.63], // pink
];
const COLOR_HEX = ['#00d4e8','#e8a030','#e84060','#60e878','#a070e0','#e8c840','#4898e8','#e868a0'];
let colorIdx = 0;

// ── Compute gravitational potential at (x,y) ─────────
// Raw Newtonian potential (unmapped)
function rawPotential(x, y, bodies, G) {
  let phi = 0;
  const s2 = GRID_SOFTENING * GRID_SOFTENING;
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    const dx = x - b.x, dy = y - b.y;
    const r = Math.sqrt(dx * dx + dy * dy + s2); // Plummer softening
    phi -= G * b.mass / r;
  }
  return phi;
}

// Map raw phi to display Z via pow-of-log compression.
// PHI_SCALE linearizes the log for small potentials, reducing bump/well asymmetry.
function mapPhi(phi) {
  const sign = phi < 0 ? -1 : 1;
  const z = sign * Z_SCALE * Math.pow(Math.log(1 + Math.abs(phi) / PHI_SCALE), CURVATURE_EXP);
  return Math.max(-MAX_WELL_DEPTH, Math.min(MAX_WELL_DEPTH, z));
}

// Convenience: raw potential → mapped Z (used when no normalization needed)
function potential(x, y, bodies, G) {
  return mapPhi(rawPotential(x, y, bodies, G));
}

// ── Body ─────────────────────────────────────────────
class Body {
  constructor(x, y, mass, vx=0, vy=0) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.mass = mass;
    this.cidx = colorIdx++ % COLORS.length;
    this.color = COLORS[this.cidx];
    this.hex = COLOR_HEX[this.cidx];
    this.r = Math.max(0.2, 0.65 * Math.pow(Math.abs(mass), 1/3));
  }
}

// ── Simulation ───────────────────────────────────────
class Simulation {
  constructor() {
    this.bodies = [];
    this.G = G_DEFAULT;
    this.paused = false;
    this.nextMass = 5;
    this.currentPreset = 'solar';
  }

  step() {
    if (this.paused) return;
    const dt = DT * timeDilation;
    const n = this.bodies.length;
    for (let i = 0; i < n; i++) {
      const bi = this.bodies[i];
      let ax = 0, ay = 0;
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const bj = this.bodies[j];
        const dx = bj.x - bi.x, dy = bj.y - bi.y;
        const r2 = dx * dx + dy * dy + SOFTENING * SOFTENING;
        const r = Math.sqrt(r2);
        const f = this.G * bj.mass / (r * r * r);
        ax += f * dx; ay += f * dy;
      }
      bi.vx += ax * dt; bi.vy += ay * dt;
    }
    for (const b of this.bodies) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.r = Math.max(0.15, 0.5 * Math.pow(Math.abs(b.mass), 1/3));
      const d = Math.hypot(b.x, b.y);
      if (d > BOUNDARY_R) {
        const nx = b.x / d, ny = b.y / d;
        b.x = nx * BOUNDARY_R;
        b.y = ny * BOUNDARY_R;
        const vDotN = b.vx * nx + b.vy * ny;
        if (vDotN > 0) {
          b.vx -= (1 + BOUNCE_DAMP) * vDotN * nx;
          b.vy -= (1 + BOUNCE_DAMP) * vDotN * ny;
        }
      }
    }
  }

  addBody(x, y, mass, vx, vy) {
    this.bodies.push(new Body(x, y, mass ?? this.nextMass, vx || 0, vy || 0));
  }

  removeBody(idx) {
    if (idx >= 0 && idx < this.bodies.length) this.bodies.splice(idx, 1);
  }

  reset() {
    this.bodies = [];
    colorIdx = 0;
  }

  loadPreset(name) {
    this.reset();
    this.currentPreset = name;
    const presets = {
      solar: () => {
        this.addBody(0, 0, 20, 0, 0);
        this.addBody(6, 0, 0.8, 0, Math.sqrt(this.G * 20 / 6));
        this.addBody(-10, 0, 1.2, 0, -Math.sqrt(this.G * 20 / 10));
        this.addBody(0, 15, 0.5, -Math.sqrt(this.G * 20 / 15), 0);
      },
      binary: () => {
        const sep = 8, m = 10;
        const v = Math.sqrt(this.G * m / (4 * (sep / 2)));
        this.addBody(-sep / 2, 0, m, 0, -v);
        this.addBody(sep / 2, 0, m, 0, v);
      },
      figure8: () => {
        const m = 3, S = 6;
        const vS = Math.sqrt(this.G * m / S);
        this.addBody(-0.97 * S, 0.243 * S, m, 0.4662 * vS, 0.4324 * vS);
        this.addBody(0.97 * S, -0.243 * S, m, 0.4662 * vS, 0.4324 * vS);
        this.addBody(0, 0, m, -0.9324 * vS, -0.8647 * vS);
      },
      trojan: () => {
        const M = 18;
        const r1 = 8, r2 = 8;
        const v1 = Math.sqrt(this.G * M / r1);
        const v2_ = Math.sqrt(this.G * M / r2);
        this.addBody(0, 0, M, 0, 0);
        this.addBody(r1, 0, 1, 0, v1);
        const a4 = Math.PI / 3;
        this.addBody(r2 * Math.cos(a4), r2 * Math.sin(a4), 1, -v2_ * Math.sin(a4), v2_ * Math.cos(a4));
        const a5 = -Math.PI / 3;
        this.addBody(r2 * Math.cos(a5), r2 * Math.sin(a5), 0.8, -v2_ * Math.sin(a5), v2_ * Math.cos(a5));
      },
      runaway: () => {
        // Bondi runaway pair: +15 and -15 side by side.
        // Positive flees, negative chases — both accelerate in the same direction forever.
        this.addBody(-3, 0, 15, 0, 0.3);
        this.addBody(3, 0, -15, 0, 0.3);
      },
      necklace: () => {
        // 6 equal masses in a hexagonal ring, all orbiting their common center.
        // Beautiful symmetric wells — famously unstable, watch it shatter.
        const n = 6, m = 5, r = 10;
        // Orbital speed for n equal masses in a ring (gravitational pull from all others)
        let fSum = 0;
        for (let k = 1; k < n; k++) {
          fSum += 1 / (2 * Math.sin(Math.PI * k / n));
        }
        const v = Math.sqrt(this.G * m * fSum / r);
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          this.addBody(r * Math.cos(a), r * Math.sin(a), m, -v * Math.sin(a), v * Math.cos(a));
        }
      },
      intruder: () => {
        // Stable binary pair, then a negative-mass intruder flies in from the side.
        // Watch the bump crash into the wells.
        const sep = 8, m = 10;
        const v = Math.sqrt(this.G * m / (4 * (sep / 2)));
        this.addBody(-sep / 2, 0, m, 0, -v);
        this.addBody(sep / 2, 0, m, 0, v);
        // Intruder: negative mass approaching from upper-left
        this.addBody(-25, 20, -12, 1.5, -1.2);
      },
      collapse: () => {
        // 5 equal masses at pentagon vertices, all stationary.
        // Symmetric free-fall — then floating-point noise breaks symmetry unpredictably.
        const n = 5, m = 8, r = 12;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2 - Math.PI / 2;
          this.addBody(r * Math.cos(a), r * Math.sin(a), m, 0, 0);
        }
      },
      hierarchy: () => {
        // Sun-planet-moon: three nested orbital scales.
        // Deep well with a smaller well spiraling inside it, and a tiny well orbiting that.
        const Ms = 20, Mp = 3, Mm = 0.1;
        const rp = 14; // planet orbital radius
        const rm = 2.5; // moon distance from planet
        const vp = Math.sqrt(this.G * Ms / rp);
        // Moon orbits planet: speed relative to planet, plus planet's orbital velocity
        const vm = Math.sqrt(this.G * Mp / rm);
        this.addBody(0, 0, Ms, 0, 0);
        this.addBody(rp, 0, Mp, 0, vp);
        this.addBody(rp + rm, 0, Mm, 0, vp + vm);
      },
    };
    if (presets[name]) presets[name]();
  }
}

// ── WebGL 3D Renderer ────────────────────────────────
class Renderer {
  constructor(sim) {
    this.sim = sim;
    this.canvas = document.getElementById('c');
    const gl = this.canvas.getContext('webgl', { antialias: true, alpha: false });
    if (!gl) { alert('WebGL not supported'); return; }
    this.gl = gl;

    // Camera
    this.camPitch = 35 * Math.PI / 180;
    this.camYaw = -30 * Math.PI / 180;
    this.camDist = 100;
    this.camTarget = v3.create(0, 0, -2);
    this.refZ = 0;  // reference Z level (computed per frame)

    // Grid vertex data: (GRID_N+1)^2 vertices
    this.gridN = GRID_N;
    const gn1 = GRID_N + 1;
    this.gridVerts = new Float32Array(gn1 * gn1 * 3);

    // Build grid index arrays for lines
    const lineIndices = [];
    for (let i = 0; i <= GRID_N; i++) {
      for (let j = 0; j < GRID_N; j++) {
        // Horizontal line
        lineIndices.push(i * gn1 + j, i * gn1 + j + 1);
        // Vertical line
        lineIndices.push(j * gn1 + i, (j + 1) * gn1 + i);
      }
    }
    this.gridLineCount = lineIndices.length;
    this.gridIndices = new Uint32Array(lineIndices);

    this._initGL();
    this._initGridBuffers();
    this._initBodyBuffers();
  }

  _initGL() {
    const gl = this.gl;
    gl.clearColor(0.024, 0.024, 0.031, 1);
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // ── Grid shader: pos -> color based on depth ──
    const gridVS = `
      attribute vec3 aPos;
      uniform mat4 uMVP;
      varying float vDepth;
      void main() {
        vDepth = aPos.z;
        gl_Position = uMVP * vec4(aPos, 1.0);
      }
    `;
    const gridFS = `
      precision mediump float;
      varying float vDepth;
      uniform float uMinZ;
      uniform float uMaxZ;
      void main() {
        vec3 base = vec3(0.15, 0.18, 0.25);
        vec3 wellCol = vec3(0.0, 0.6, 0.85);
        vec3 bumpCol = vec3(0.85, 0.4, 0.15);
        float wellI = clamp(-vDepth / (-uMinZ + 0.01), 0.0, 1.0);
        float bumpI = clamp(vDepth / (uMaxZ + 0.01), 0.0, 1.0);
        vec3 col = base;
        col = mix(col, wellCol, wellI);
        col = mix(col, bumpCol, bumpI);
        float alpha = 0.12 + 0.48 * max(wellI, bumpI);
        gl_FragColor = vec4(col, alpha);
      }
    `;
    this.gridProg = this._mkProg(gridVS, gridFS);

    // ── Body shader: point sprites with glow ──
    const bodyVS = `
      attribute vec3 aPos;
      attribute vec4 aColor;
      attribute float aSize;
      uniform mat4 uMVP;
      uniform float uScale;
      varying vec4 vColor;
      void main() {
        vColor = aColor;
        gl_Position = uMVP * vec4(aPos, 1.0);
        gl_PointSize = aSize * uScale / gl_Position.w;
      }
    `;
    const bodyFS = `
      precision mediump float;
      varying vec4 vColor;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float r = dot(c, c);
        if (r > 0.25) discard;
        float core = smoothstep(0.25, 0.01, r);
        float glow = smoothstep(0.25, 0.0, r) * 0.4;
        gl_FragColor = vec4(vColor.rgb * (core + glow), vColor.a * (core * 0.9 + glow));
      }
    `;
    this.bodyProg = this._mkProg(bodyVS, bodyFS);

    // ── Boundary ring shader ──
    const ringVS = `
      attribute vec3 aPos;
      uniform mat4 uMVP;
      void main() {
        gl_Position = uMVP * vec4(aPos, 1.0);
      }
    `;
    const ringFS = `
      precision mediump float;
      void main() {
        gl_FragColor = vec4(0.2, 0.24, 0.32, 0.25);
      }
    `;
    this.ringProg = this._mkProg(ringVS, ringFS);

    // Boundary ring (dynamic — follows mesh surface each frame)
    this.ringSegs = 128;
    this.ringVertCount = this.ringSegs + 1;
    this.ringVerts = new Float32Array(this.ringVertCount * 3);
    this.ringBuf = gl.createBuffer();
  }

  _mkProg(vs, fs) {
    const gl = this.gl;
    const v = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(v, vs); gl.compileShader(v);
    const f = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(f, fs); gl.compileShader(f);
    const p = gl.createProgram();
    gl.attachShader(p, v); gl.attachShader(p, f);
    gl.linkProgram(p);
    return p;
  }

  _initGridBuffers() {
    const gl = this.gl;
    this.gridVBuf = gl.createBuffer();
    this.gridIBuf = gl.createBuffer();

    // Check for OES_element_index_uint
    gl.getExtension('OES_element_index_uint');

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.gridIBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, this.gridIndices, gl.STATIC_DRAW);
  }

  _initBodyBuffers() {
    const gl = this.gl;
    this.bodyBuf = gl.createBuffer();
  }

  // Compute reference Z level: average *raw* potential at boundary, then map once.
  // Averaging raw phi before the nonlinear mapPhi prevents asymmetry between
  // positive and negative masses at different distances from the boundary.
  _computeRefZ() {
    const bodies = this.sim.bodies;
    const G = this.sim.G;
    if (!bodies.length) { this.refZ = 0; return; }
    let sum = 0;
    const n = 8;
    for (let k = 0; k < n; k++) {
      const a = (k / n) * Math.PI * 2;
      sum += rawPotential(BOUNDARY_R * Math.cos(a), BOUNDARY_R * Math.sin(a), bodies, G);
    }
    this.refZ = mapPhi(sum / n);
  }

  _updateGridVerts() {
    const gn1 = this.gridN + 1;
    const extent = Math.max(BOUNDARY_R + 2, this.camDist * 0.55);
    const step = (extent * 2) / this.gridN;
    const bodies = this.sim.bodies;
    const G = this.sim.G;
    const ref = this.refZ;

    for (let i = 0; i <= this.gridN; i++) {
      for (let j = 0; j <= this.gridN; j++) {
        const x = -extent + j * step;
        const y = -extent + i * step;
        const idx = (i * gn1 + j) * 3;
        this.gridVerts[idx] = x;
        this.gridVerts[idx + 1] = y;
        this.gridVerts[idx + 2] = potential(x, y, bodies, G) - ref;
      }
    }
  }

  _updateRingVerts() {
    const bodies = this.sim.bodies;
    const G = this.sim.G;
    const ref = this.refZ;
    for (let i = 0; i <= this.ringSegs; i++) {
      const a = (i / this.ringSegs) * Math.PI * 2;
      const x = BOUNDARY_R * Math.cos(a);
      const y = BOUNDARY_R * Math.sin(a);
      const idx = i * 3;
      this.ringVerts[idx] = x;
      this.ringVerts[idx + 1] = y;
      this.ringVerts[idx + 2] = potential(x, y, bodies, G) - ref;
    }
  }

  getMVP() {
    const cp = Math.cos(this.camPitch), sp = Math.sin(this.camPitch);
    const cy = Math.cos(this.camYaw), sy = Math.sin(this.camYaw);
    const eye = v3.create(
      this.camTarget[0] + this.camDist * cp * sy,
      this.camTarget[1] + this.camDist * cp * cy,
      this.camTarget[2] + this.camDist * sp
    );
    // Z-up coordinate system
    const view = mat4LookAt(eye, this.camTarget, v3.create(0, 0, 1));
    const aspect = this.w / this.h;
    const proj = mat4Perspective(Math.PI / 4, aspect, 0.1, 300);
    return mat4Mul(proj, view);
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    this.w = window.innerWidth;
    this.h = window.innerHeight;
    this.canvas.width = this.w * dpr;
    this.canvas.height = this.h * dpr;
    this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
  }

  // Unproject screen coords to z=0 plane (for placing bodies)
  unproject(mx, my) {
    const mvp = this.getMVP();
    const inv = mat4Inv(mvp);
    if (!inv) return null;
    const dpr = window.devicePixelRatio || 1;
    const nx = (mx / this.w) * 2 - 1;
    const ny = 1 - (my / this.h) * 2;

    function up(zNdc) {
      const x = inv[0]*nx + inv[4]*ny + inv[8]*zNdc + inv[12];
      const y = inv[1]*nx + inv[5]*ny + inv[9]*zNdc + inv[13];
      const z = inv[2]*nx + inv[6]*ny + inv[10]*zNdc + inv[14];
      const w = inv[3]*nx + inv[7]*ny + inv[11]*zNdc + inv[15];
      return v3.create(x/w, y/w, z/w);
    }
    const near = up(-1), far = up(1);
    const dir = v3.sub(far, near);
    // Intersect with z=0 plane
    if (Math.abs(dir[2]) < 1e-6) return null;
    const t = -near[2] / dir[2];
    if (t < 0) return null;
    const hit = v3.add(near, v3.scale(dir, t));
    return { x: hit[0], y: hit[1] };
  }

  // Find body under cursor
  findBody(mx, my) {
    const hit = this.unproject(mx, my);
    if (!hit) return null;
    let best = -1, bestD = Infinity;
    for (let i = 0; i < this.sim.bodies.length; i++) {
      const b = this.sim.bodies[i];
      const d = Math.hypot(b.x - hit.x, b.y - hit.y);
      const thresh = Math.max(b.r * 2, 1.5);
      if (d < thresh && d < bestD) { best = i; bestD = d; }
    }
    return best >= 0 ? best : null;
  }

  render() {
    const gl = this.gl;
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    this._computeRefZ();
    this._updateGridVerts();
    this._updateRingVerts();
    const mvp = this.getMVP();

    this._drawGrid(mvp);
    this._drawBoundary(mvp);
    this._drawBodies(mvp);
  }

  _drawGrid(mvp) {
    const gl = this.gl;
    const prog = this.gridProg;
    gl.useProgram(prog);

    gl.uniformMatrix4fv(gl.getUniformLocation(prog, 'uMVP'), false, mvp);

    // Find min/max Z for coloring
    let minZ = 0, maxZ = 0;
    for (let i = 2; i < this.gridVerts.length; i += 3) {
      if (this.gridVerts[i] < minZ) minZ = this.gridVerts[i];
      if (this.gridVerts[i] > maxZ) maxZ = this.gridVerts[i];
    }
    gl.uniform1f(gl.getUniformLocation(prog, 'uMinZ'), minZ);
    gl.uniform1f(gl.getUniformLocation(prog, 'uMaxZ'), maxZ);

    gl.bindBuffer(gl.ARRAY_BUFFER, this.gridVBuf);
    gl.bufferData(gl.ARRAY_BUFFER, this.gridVerts, gl.DYNAMIC_DRAW);

    const aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.gridIBuf);
    gl.drawElements(gl.LINES, this.gridLineCount, gl.UNSIGNED_INT, 0);

    gl.disableVertexAttribArray(aPos);
  }

  _drawBoundary(mvp) {
    const gl = this.gl;
    const prog = this.ringProg;
    gl.useProgram(prog);
    gl.uniformMatrix4fv(gl.getUniformLocation(prog, 'uMVP'), false, mvp);

    gl.bindBuffer(gl.ARRAY_BUFFER, this.ringBuf);
    gl.bufferData(gl.ARRAY_BUFFER, this.ringVerts, gl.DYNAMIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.LINE_LOOP, 0, this.ringVertCount);
    gl.disableVertexAttribArray(aPos);
  }

  _drawBodies(mvp) {
    const gl = this.gl;
    const bodies = this.sim.bodies;
    if (!bodies.length) return;

    const prog = this.bodyProg;
    gl.useProgram(prog);
    gl.uniformMatrix4fv(gl.getUniformLocation(prog, 'uMVP'), false, mvp);
    gl.uniform1f(gl.getUniformLocation(prog, 'uScale'), this.canvas.height * 0.5);

    // Two passes: glow then core
    // Bodies sit at bottom of their own wells (include self-potential via softening)
    const data = [];
    const G = this.sim.G;
    const ref = this.refZ;
    // Pass 1: glow (bigger, dim) — bodies offset by radius INTO their curve
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      const surfZ = potential(b.x, b.y, bodies, G) - ref;
      const offset = b.mass >= 0 ? b.r : -b.r; // positive mass sits above well, negative below bump
      data.push(b.x, b.y, surfZ + offset, b.color[0]*0.6, b.color[1]*0.6, b.color[2]*0.6, 0.25, b.r * 8);
    }
    // Pass 2: core (smaller, bright)
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      const surfZ = potential(b.x, b.y, bodies, G) - ref;
      const offset = b.mass >= 0 ? b.r : -b.r;
      data.push(b.x, b.y, surfZ + offset, b.color[0], b.color[1], b.color[2], 0.95, b.r * 3.5);
    }

    const arr = new Float32Array(data);
    gl.bindBuffer(gl.ARRAY_BUFFER, this.bodyBuf);
    gl.bufferData(gl.ARRAY_BUFFER, arr, gl.DYNAMIC_DRAW);

    const stride = 32; // 8 floats * 4 bytes
    const aPos = gl.getAttribLocation(prog, 'aPos');
    const aColor = gl.getAttribLocation(prog, 'aColor');
    const aSize = gl.getAttribLocation(prog, 'aSize');

    gl.enableVertexAttribArray(aPos);
    gl.enableVertexAttribArray(aColor);
    gl.enableVertexAttribArray(aSize);

    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, stride, 0);
    gl.vertexAttribPointer(aColor, 4, gl.FLOAT, false, stride, 12);
    gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, stride, 28);

    gl.depthMask(false);
    gl.drawArrays(gl.POINTS, 0, bodies.length * 2);
    gl.depthMask(true);

    gl.disableVertexAttribArray(aPos);
    gl.disableVertexAttribArray(aColor);
    gl.disableVertexAttribArray(aSize);
  }
}

// ── HUD ──────────────────────────────────────────────
function updateHUD(sim) {
  document.getElementById('s-n').textContent = sim.bodies.length;
  document.getElementById('s-g').textContent = sim.G.toFixed(3);
  const st = document.getElementById('s-st');
  st.textContent = sim.paused ? 'paused' : 'running';
  st.className = 'val ' + (sim.paused ? 'off' : 'on');
  const dot = document.getElementById('pulse-dot');
  dot.className = 'pulse-dot' + (sim.paused ? ' paused' : '');

  const list = document.getElementById('body-list');
  if (!sim.bodies.length) {
    list.innerHTML = '<span style="color:var(--hud-dim)">-- empty --</span>';
  } else {
    list.innerHTML = sim.bodies.map((b, i) => {
      const v = Math.hypot(b.vx, b.vy).toFixed(1);
      return `<div class="body-row"><span class="body-pip" style="background:${b.hex};box-shadow:0 0 6px ${b.hex}"></span><span style="color:${b.hex}">${i}</span><span>m=${b.mass.toFixed(1)}</span><span style="color:var(--hud-dim)">v=${v}</span></div>`;
    }).join('');
  }
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1000);
}

// Sliders
function bindSlider(id, valId, fmt, onChange) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { const v = parseFloat(sl.value); vl.textContent = fmt(v); onChange(v); });
  // Scrollwheel on slider
  sl.addEventListener('wheel', e => {
    e.preventDefault();
    const step = parseFloat(sl.step) || 1;
    const delta = e.deltaY < 0 ? step : -step;
    const min = parseFloat(sl.min), max = parseFloat(sl.max);
    sl.value = Math.max(min, Math.min(max, parseFloat(sl.value) + delta));
    sl.dispatchEvent(new Event('input'));
  }, { passive: false });
  return sl;
}
const slider = bindSlider('mass-slider', 'mass-val', v => v.toFixed(1), v => { sim.nextMass = v; });
bindSlider('g-slider', 'g-val', v => v.toFixed(3), v => { sim.G = v; });
bindSlider('time-slider', 'time-val', v => v.toFixed(1) + 'x', v => { timeDilation = v; });
bindSlider('zscale-slider', 'zscale-val', v => v.toFixed(1), v => { Z_SCALE = v; });
bindSlider('curve-slider', 'curve-val', v => v.toFixed(2), v => { CURVATURE_EXP = v; });
bindSlider('soften-slider', 'soften-val', v => v.toFixed(1), v => { GRID_SOFTENING = v; });

function syncSliders() {
  document.getElementById('mass-slider').value = sim.nextMass;
  document.getElementById('mass-val').textContent = sim.nextMass.toFixed(1);
  document.getElementById('g-slider').value = sim.G;
  document.getElementById('g-val').textContent = sim.G.toFixed(3);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case ' ': e.preventDefault(); sim.paused = !sim.paused; toast(sim.paused ? 'PAUSED' : 'RUNNING'); break;
    case 'r': case 'R': sim.loadPreset(sim.currentPreset); toast('RESET'); break;
    case 'G': sim.G = Math.min(sim.G + 1, 50); syncSliders(); break;
    case 'g': sim.G = Math.max(sim.G - 1, -50); syncSliders(); break;
    case '=': case '+': sim.nextMass = Math.min(sim.nextMass + 1, 200); syncSliders(); break;
    case '-': sim.nextMass = Math.max(sim.nextMass - 1, -200); syncSliders(); break;
  }
});

// Mouse: click to add, right-click to remove, drag to orbit, scroll to zoom
let isDragging = false;
let lastMouse = null;

ren.canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isDragging = false;
    lastMouse = [e.clientX, e.clientY];
  }
});

ren.canvas.addEventListener('mousemove', e => {
  if (lastMouse && e.buttons & 1) {
    const dx = e.clientX - lastMouse[0];
    const dy = e.clientY - lastMouse[1];
    if (!isDragging && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
      isDragging = true;
    }
    if (isDragging) {
      ren.camYaw += dx * 0.005;
      ren.camPitch = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, ren.camPitch + dy * 0.005));
    }
    lastMouse = [e.clientX, e.clientY];
  }
});

ren.canvas.addEventListener('mouseup', e => {
  if (e.button === 0 && !isDragging) {
    const hit = ren.unproject(e.clientX, e.clientY);
    if (hit && Math.hypot(hit.x, hit.y) < BOUNDARY_R) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 8;
      sim.addBody(hit.x, hit.y, undefined, speed * Math.cos(angle), speed * Math.sin(angle));
    }
  }
  lastMouse = null;
  isDragging = false;
});

ren.canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const idx = ren.findBody(e.clientX, e.clientY);
  if (idx !== null) sim.removeBody(idx);
});

ren.canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.08 : 0.92;
  ren.camDist = Math.max(25, Math.min(300, ren.camDist * factor));
}, { passive: false });

// ── Loop ─────────────────────────────────────────────
let lastHud = 0;
function loop(t) {
  for (let i = 0; i < STEPS_PER_FRAME; i++) sim.step();
  ren.render();
  if (t - lastHud > 100) { updateHUD(sim); lastHud = t; }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
